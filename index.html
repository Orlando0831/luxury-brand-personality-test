<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的高奢品牌人格 | Luxury Brand Persona</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --accent-gold: #c5a059;
            --accent-gold-hover: #d4b06a;
            --card-bg: #141414;
            --border-color: #333333;
            --font-serif: "Playfair Display", "Noto Serif SC", serif;
            --font-sans: "Helvetica Neue", Arial, sans-serif;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h2, h3 {
            font-family: var(--font-serif);
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .gold-text {
            color: var(--accent-gold);
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
            display: none;
        }

        .container.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
            width: 100%;
            max-width: 800px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: var(--font-sans);
            transition: var(--transition);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            background: var(--accent-gold);
            color: var(--bg-color);
        }

        .btn:disabled {
            border-color: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
            background: transparent;
        }

        .question-card {
            background: var(--card-bg);
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .question-card:hover {
            border-color: #444;
        }

        .question-text {
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-family: var(--font-serif);
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .option-label:hover {
            background: #1a1a1a;
            border-color: #555;
        }

        input[type="radio"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid var(--text-secondary);
            border-radius: 50%;
            margin-right: 15px;
            position: relative;
            flex-shrink: 0;
        }

        input[type="radio"]:checked {
            border-color: var(--accent-gold);
        }

        input[type="radio"]:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: var(--accent-gold);
            border-radius: 50%;
        }

        input[type="radio"]:checked + span {
            color: var(--accent-gold);
        }

        .result-hero {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        .brand-logo-text {
            font-size: 3rem;
            font-family: var(--font-serif);
            color: var(--accent-gold);
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }

        .persona-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
            font-style: italic;
        }

        .ranking-list {
            list-style: none;
            margin-top: 30px;
        }

        .ranking-item {
            padding: 15px 0;
            border-bottom: 1px solid #222;
            font-size: 1rem;
        }

        .ranking-item:first-child {
            color: var(--accent-gold);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .social-hall {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
        }

        .social-hall h3 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-align: center;
        }

        .user-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: var(--card-bg);
            padding: 15px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .user-card .name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .user-card .brand {
            color: var(--accent-gold);
            font-size: 0.9rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 40px;
            border: 1px solid var(--accent-gold);
            max-width: 400px;
            text-align: center;
        }

        .modal-content p {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .modal-btn {
            background: var(--accent-gold);
            color: var(--bg-color);
            border: none;
            padding: 10px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .hidden {
            display: none !important;
        }
        
        .progress-bar {
            height: 2px;
            background: #222;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--accent-gold);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <header>
        <h1>LUXURY BRAND <span class="gold-text">PERSONA</span></h1>
        <p>Discover Your High-Fashion Soul</p>
    </header>

    <div id="stage-info" class="container active">
        <h2 style="margin-bottom: 30px; text-align: center;">Identity Registration</h2>
        <div class="form-group">
            <label for="nickname">Nickname / 昵称</label>
            <input type="text" id="nickname" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label for="gender">Gender / 性别</label>
            <select id="gender">
                <option value="" disabled selected>Select Gender</option>
                <option value="Female">Female / 女</option>
                <option value="Male">Male / 男</option>
                <option value="Non-binary">Non-binary / 非二元</option>
                <option value="Prefer not to say">Prefer not to say / 保密</option>
            </select>
        </div>
        <div class="form-group">
            <label for="age">Age / 年龄</label>
            <input type="number" id="age" placeholder="e.g., 25" min="10" max="100">
        </div>
        <button class="btn" id="startBtn" disabled>Begin Test / 开始测试</button>
    </div>

    <div id="stage-quiz" class="container">
        <div id="questions-container"></div>
        <button class="btn" id="generateResultBtn">Generate Result / 生成结果</button>
    </div>

    <div id="stage-result" class="container">
        <div class="result-hero">
            <p style="color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.2em;">Your Top Match</p>
            <div class="brand-logo-text" id="topBrandName">BRAND</div>
            <p class="persona-desc" id="topBrandDesc">Description goes here...</p>
        </div>

        <div style="padding: 0 20px;">
            <h3 style="margin-bottom: 20px; border-left: 2px solid var(--accent-gold); padding-left: 15px;">Affinity Ranking</h3>
            <ul class="ranking-list" id="rankingList"></ul>
        </div>

        <div class="social-hall" id="socialHall">
            <h3>Social Hall / 社交大厅</h3>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px; font-size: 0.9rem;">
                Exclusive community of completed personas.
            </p>
            <div class="user-list" id="userList"></div>
        </div>
        
        <button class="btn" onclick="location.reload()" style="margin-top: 40px;">Retake Test / 重新测试</button>
    </div>

    <div class="modal-overlay" id="alertModal">
        <div class="modal-content">
            <p id="modalMessage">Message</p>
            <button class="modal-btn" onclick="closeModal()">Confirm</button>
        </div>
    </div>

            { id: 1, text: "面对一个突如其来的复杂难题，你的第一反应是？", options: [

            { id: 14, text: "购物时，最打动你的是？", options: [

            { id: 15, text: "你如何看待'流行趋势'？", options: [

            { id: 19, text: "你更欣赏哪种人生状态？", options: [

            ]},
            { id: 20, text: "对于'奢侈品'的定义，你认为最重要的是？", options: [

                { text: "设计与创意。", scores: { gucci: 3, balenciaga: 2 } },
                { text: "品牌影响力。", scores: { lv: 3, chanel: 2 } },
                { text: "品质与舒适。", scores: { armani: 3, prada: 2 } }
            ]},
            { id: 21, text: "你如何处理旧物？", options: [
                { text: "精心保养，长期使用直至无法修复。", scores: { hermes: 3, armani: 2 } },
                { text: "定期清理，捐赠或转卖。", scores: { prada: 2, chanel: 2 } },
                { text: "改造翻新，赋予新的生命。", scores: { gucci: 3, lv: 2 } },
                { text: "果断丢弃，不留恋过去。", scores: { balenciaga: 2, dior: 2 } }
            ]},
            { id: 22, text: "在餐厅点餐时，你通常？", options: [
                { text: "询问服务生的推荐，信任专业人士。", scores: { dior: 3, lv: 2 } },
                { text: "提前研究菜单，目标明确。", scores: { armani: 3, prada: 2 } },
                { text: "看哪道菜名字特别或图片诱人。", scores: { gucci: 3, balenciaga: 2 } },
                { text: "点经典的招牌菜，不会出错。", scores: { hermes: 2, chanel: 3 } }
            ]},
            { id: 23, text: "你更害怕什么？", options: [
                { text: "平庸和无趣。", scores: { balenciaga: 3, gucci: 2 } },
                { text: "失控和混乱。", scores: { armani: 3, hermes: 2 } },
                { text: "被忽视和遗忘。", scores: { lv: 3, dior: 2 } },
                { text: "肤浅和无知。", scores: { prada: 3, chanel: 2 } }
            ]},
            { id: 24, text: "如果用一种动物形容自己，你觉得是？", options: [
                { text: "狮子：威严、掌控力。", scores: { armani: 3, lv: 2 } },
                { text: "猫：独立、优雅、神秘。", scores: { chanel: 3, hermes: 2 } },
                { text: "孔雀：华丽、表现欲。", scores: { gucci: 3, dior: 2 } },
                { text: "狼：冷静、敏锐、孤僻。", scores: { prada: 2, balenciaga: 3 } }
            ]}
        ];

        let userAnswers = {};
        let brandScores = {};
        let dimensionScores = {}; // 新增：维度得分记录

        // 题目维度映射 (6个维度)
        const questionDimensions = {
            1: 'approach', 2: 'interest', 3: 'interest', 4: 'interest',
            5: 'social', 6: 'social', 7: 'work', 8: 'approach',
            9: 'approach', 10: 'social', 11: 'style', 12: 'style',
            13: 'interest', 14: 'approach', 15: 'style', 16: 'work',
            17: 'interest', 18: 'approach', 19: 'work', 20: 'approach',
            21: 'approach', 22: 'social', 23: 'work', 24: 'social'
        };

        function initScores() {
            brandScores = { hermes: 0, chanel: 0, lv: 0, gucci: 0, dior: 0, prada: 0, balenciaga: 0, armani: 0 };
            dimensionScores = {
                approach: { hermes: 0, chanel: 0, lv: 0, gucci: 0, dior: 0, prada: 0, balenciaga: 0, armani: 0 },
                interest: { hermes: 0, chanel: 0, lv: 0, gucci: 0, dior: 0, prada: 0, balenciaga: 0, armani: 0 },
                social: { hermes: 0, chanel: 0, lv: 0, gucci: 0, dior: 0, prada: 0, balenciaga: 0, armani: 0 },
                work: { hermes: 0, chanel: 0, lv: 0, gucci: 0, dior: 0, prada: 0, balenciaga: 0, armani: 0 },
                style: { hermes: 0, chanel: 0, lv: 0, gucci: 0, dior: 0, prada: 0, balenciaga: 0, armani: 0 }
            };
        }

        const stageInfo = document.getElementById('stage-info');
        const stageQuiz = document.getElementById('stage-quiz');
        const stageResult = document.getElementById('stage-result');
        const nicknameInput = document.getElementById('nickname');
        const genderSelect = document.getElementById('gender');
        const ageInput = document.getElementById('age');
        const startBtn = document.getElementById('startBtn');
        const questionsContainer = document.getElementById('questions-container');
        const generateResultBtn = document.getElementById('generateResultBtn');
        const alertModal = document.getElementById('alertModal');
        const modalMessage = document.getElementById('modalMessage');
        const progressFill = document.getElementById('progressFill');

        // Form Validation for Stage 1
        function checkFormValidity() {
            if (nicknameInput.value.trim() && genderSelect.value && ageInput.value) {
                startBtn.disabled = false;
            } else {
                startBtn.disabled = true;
            }
        }

        nicknameInput.addEventListener('input', checkFormValidity);
        genderSelect.addEventListener('change', checkFormValidity);
        ageInput.addEventListener('input', checkFormValidity);

        // Start Test
        startBtn.addEventListener('click', () => {
            userProfile = {
                nickname: nicknameInput.value.trim(),
                gender: genderSelect.value,
                age: ageInput.value
            };
            initScores();
            renderQuestions();
            switchStage(stageInfo, stageQuiz);
        });

        // Render Questions
        function renderQuestions() {
            questionsContainer.innerHTML = '';
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <div class="question-text">${index + 1}. ${q.text}</div>
                    <div class="options-grid">
                        ${q.options.map((opt, optIndex) => `
                            <label class="option-label">
                                <input type="radio" name="q${q.id}" value="${optIndex}" data-question-id="${q.id}">
                                <span>${opt.text}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                questionsContainer.appendChild(card);
            });

            // Add event listeners to radio buttons
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const qId = parseInt(e.target.dataset.questionId);
                    const optIndex = parseInt(e.target.value);
                    userAnswers[qId] = optIndex;
                    updateProgress();
                });
            });
        }

        function updateProgress() {
            const answeredCount = Object.keys(userAnswers).length;
            const progress = (answeredCount / questions.length) * 100;
            progressFill.style.width = `${progress}%`;
        }

        // Generate Result
        generateResultBtn.addEventListener('click', () => {
            if (Object.keys(userAnswers).length < questions.length) {
                showModal("您还有未做完的题目");
                return;
            }
            calculateResults();
            saveToLocalStorage();
            displayResults();
            switchStage(stageQuiz, stageResult);
            loadSocialHall();
        });

        function calculateResults() {
            initScores();
            
            // 1. 原始分数累加与维度记录
            questions.forEach(q => {
                const selectedOptIndex = userAnswers[q.id];
                const selectedOption = q.options[selectedOptIndex];
                const dim = questionDimensions[q.id];

                if (selectedOption && selectedOption.scores) {
                    for (const [brand, score] of Object.entries(selectedOption.scores)) {
                        if (brandScores[brand] !== undefined) {
                            brandScores[brand] += score;
                            if (dim && dimensionScores[dim][brand] !== undefined) {
                                dimensionScores[dim][brand] += score;
                            }
                        }
                    }
                }
            });

            // 2. Z-Score 标准化处理 (消除量纲影响，使比较更公平)
            const scores = Object.values(brandScores);
            const mean = scores.reduce((a, b) => a + b, 0) / scores.length;
            const variance = scores.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / scores.length;
            const stdDev = Math.sqrt(variance);

            // 如果标准差为0（所有品牌得分一样），则不进行标准化
            if (stdDev > 0) {
                for (const brand in brandScores) {
                    // 转换为标准分，并映射到 0-100 区间以便展示
                    brandScores[brand] = ((brandScores[brand] - mean) / stdDev) * 15 + 50; 
                }
            }
        }

        function getSortedBrands() {
            return Object.entries(brandScores)
                .sort(([, a], [, b]) => b - a)
                .map(([key, score]) => ({ key, name: brands[key].name, score }));
        }

        function displayResults() {
            const sorted = getSortedBrands();
            const topBrandKey = sorted[0].key;
            
            document.getElementById('topBrandName').textContent = brands[topBrandKey].name;
            document.getElementById('topBrandDesc').textContent = brands[topBrandKey].desc;

            const rankingList = document.getElementById('rankingList');
            rankingList.innerHTML = '';
            
            // 优化后的百分比计算：基于标准化后的分数分布
            const maxScore = sorted[0].score;
            const minScore = sorted[sorted.length - 1].score;
            const range = maxScore - minScore || 1;

            sorted.slice(0, 3).forEach((item, index) => {
                // 将分数映射到 0-100% 区间，更直观地展示匹配度差异
                const percentage = Math.round(((item.score - minScore) / range) * 100);
                const li = document.createElement('li');
                li.className = 'ranking-item';
                li.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <span>${index + 1}. ${item.name}</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 100px; height: 4px; background: #333; border-radius: 2px;">
                                <div style="width: ${percentage}%; height: 100%; background: var(--accent-gold); border-radius: 2px;"></div>
                            </div>
                            <span style="font-size: 0.9rem; color: var(--text-secondary);">${percentage}%</span>
                        </div>
                    </div>
                `;
                rankingList.appendChild(li);
            });
        }

        // LocalStorage Logic
        function saveToLocalStorage() {
            const sorted = getSortedBrands();
            const topBrandName = sorted[0].name;
            
            let users = JSON.parse(localStorage.getItem('luxuryBrandPersonaUsers') || '[]');
            
            // Check if user already exists (by nickname) and update, or add new
            const existingIndex = users.findIndex(u => u.nickname === userProfile.nickname);
            const userData = {
                nickname: userProfile.nickname,
                brand: topBrandName,
                timestamp: new Date().toISOString()
            };
            
            if (existingIndex > -1) {
                users[existingIndex] = userData;
            } else {
                users.push(userData);
            }
            
            localStorage.setItem('luxuryBrandPersonaUsers', JSON.stringify(users));
        }

        function loadSocialHall() {
            const users = JSON.parse(localStorage.getItem('luxuryBrandPersonaUsers') || '[]');
            const userList = document.getElementById('userList');
            userList.innerHTML = '';
            
            // Show last 12 users, reversed (newest first)
            users.slice(-12).reverse().forEach(user => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="name">${user.nickname}</div>
                    <div class="brand">${user.brand}</div>
                `;
                userList.appendChild(card);
            });
        }

        // Utility Functions
        function switchStage(from, to) {
            from.classList.remove('active');
            setTimeout(() => {
                from.style.display = 'none';
                to.style.display = 'block';
                setTimeout(() => {
                    to.classList.add('active');
                }, 50);
            }, 400);
        }

        function showModal(message) {
            modalMessage.textContent = message;
            alertModal.classList.add('show');
        }

        function closeModal() {
            alertModal.classList.remove('show');
        }

        // Close modal on outside click
        alertModal.addEventListener('click', (e) => {
            if (e.target === alertModal) {
                closeModal();
            }
        });
    </script>
